<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <title>Product card</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="./main.js" async></script>
</head>

<body style="font-family: Montserrat;">
  <div class="all-elements bg-dandelions">
    <h1 class="product-selection__title">Выбери свой продукт</h1>
    <div class="buttons">
      <button id="recolor-first-card-button">Перекрасить фон первой карточки</button>
      <button id="recolor-all-card-button">Перекрасить фон всех карточек</button>
      <button id="open-google-button">Открыть Google</button>
      <button id="recolor-button" class="bg--purple">Перекрась меня!</button>
      <button id="registration-button">Регистрация</button>
    </div>

    <div class="modal overlay" id="modal-registration-id">
      <div class="modal-showed">
        <h2 class="modal-title">Регистрация:</h2>
        <form class="registration-form" id="reg-form">
          <div class="form-item">
            <label for="first-name">Имя:</label>
            <input type="text" placeholder="Введите имя" name="firstName" id="firstName" required>
          </div>

          <div class="form-item">
            <label for="last-name">Фамилия:</label>
            <input type="text" placeholder="Введите Фамилию" name="lastName" id="lastName" required>
          </div>

          <div class="form-item">
            <label for="birth-date">Дата рождения:</label>
            <input type="date" placeholder="Введите дату рождения" name="birthDate" id="birthDate" required>
          </div>

          <div class="form-item">
            <label for="login">Логин:</label>
            <input type="text" placeholder="Введите логин" name="login" id="login" required>
          </div>

          <div class="form-item">
            <label for="password">Пароль:</label>
            <input type="password" placeholder="Введите пароль" name="password" id="password" required minlength="6">
          </div>

          <div class="form-item">
            <label for="confirm-password">Пароль повторно:</label>
            <input type="password" placeholder="Повторите пароль" name="confirmPassword" id="confirm-password" required>
          </div>

          <button type="submit" class="submit-btn">Зарегистрироваться</button>
        </form>
        <button class="modal__close">&#10006</button>
      </div>
    </div>

    <ul id="product-card-list"></ul>

    <template id="product-card-template">
      <div class="product-card">
        <img class="product-card__img">
        <p class="product-card__type-skin"></p>
        <h3 class="product-card-name"></h3>
        <p class="product-card__description"></p>
        <p class="product-card__compound">Состав:</p>
        <ul class="product-card__compound-item"></ul>
        <p class="product-card__price-wrapper">
          <span class="product-card__price-name">Цена</span>
          <span class="product-card__price-value"></span>
        </p>
      </div>
    </template>
  </div>

  <footer>
    <div class="footer-container">
      <div class="footer-left">
        <div class="footer__info">
          <h3 class="footer-title">Product Cards</h3>
          <p class="footer-desc">У Нас Самые Лучшие Продукты Для Кожи!</p>
        </div>
        <div class="footer-socials">
          <img class="tg-icon" src="images/tg-icon.svg" alt="Телеграм">
          <img class="vk-icon" src="images/vk-icon.svg" alt="Вконтакте">
        </div>
      </div>

      <div class="footer-center">
        <p class="subscribe-label" for="email">Подпишись на наши акции:</p>
        <form class="subscribe-form" id="email-form">
          <input type="email" placeholder="Ваш Email..." name="email" class="subscribe-input" required>
          <button type="submit" class="subscribe-button">Подписаться</button>
        </form>
      </div>

      <nav class="footer-nav">
        <h3 class="footer-title">Быстрые ссылки</h3>
        <ul class="footer-menu">
          <li><a href="#">Главная</a></li>
          <li><a href="#">Магазин</a></li>
          <li><a href="#">Контакты</a></li>
        </ul>
      </nav>
    </div>

    <p class="line-decoretion"></p>

    <div class="footer-bottom">
      <a href="www.product-cards.com">www.product-cards.com</a>
      <small>©all right reserve</small>
    </div>
  </footer>


</body>

</html>
